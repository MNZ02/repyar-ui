<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repyar — Fleet Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --accent: #4F8EF7;
  --accent-dim: rgba(79,142,247,0.1);
  --accent-glow: rgba(79,142,247,0.2);
  --green: #22D3A0;
  --green-dim: rgba(34,211,160,0.1);
  --amber: #F5A623;
  --amber-dim: rgba(245,166,35,0.1);
  --red: #F05252;
  --red-dim: rgba(240,82,82,0.1);
  --purple: #A78BFA;
  --purple-dim: rgba(167,139,250,0.1);
  --sidebar-w: 216px;
  --r: 10px;
  --r-lg: 14px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #0B0D12;
  --bg-raised: #111420;
  --bg-card: #161924;
  --bg-hover: #1C2030;
  --border: rgba(255,255,255,0.06);
  --border-md: rgba(255,255,255,0.1);
  --border-hi: rgba(255,255,255,0.16);
  --text-1: #EDF0F5;
  --text-2: #7B8599;
  --text-3: #3A4055;
}

[data-theme="light"] {
  --bg: #F8FAFC;
  --bg-raised: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-hover: #F1F5F9;
  --border: rgba(0,0,0,0.06);
  --border-md: rgba(0,0,0,0.1);
  --border-hi: rgba(0,0,0,0.16);
  --text-1: #0F172A;
  --text-2: #64748B;
  --text-3: #94A3B8;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;transition: background-color 0.3s ease}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-1);font-size:13px;-webkit-font-smoothing:antialiased}

/* Shell */
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition: var(--transition)}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-name{font-size:16px;font-weight:500;letter-spacing:-.3px}
.logo-tag{font-size:10px;color:var(--text-3);font-family:'DM Mono',monospace;letter-spacing:.06em;margin-top:2px}
.nav-section{padding:14px 0 4px}
.nav-lbl{font-size:10px;color:var(--text-3);letter-spacing:.09em;text-transform:uppercase;padding:0 18px 6px;display:block}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:12.5px;color:var(--text-2);cursor:pointer;transition:color .15s;position:relative;text-decoration:none}
.nav-item:hover{color:var(--text-1)}
.nav-item.active{color:var(--text-1)}
.nav-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{width:14px;height:14px;opacity:.45;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:10px}
.u-avatar{width:28px;height:28px;border-radius:8px;background:var(--accent-dim);border:1px solid var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--accent);flex-shrink:0;font-family:'DM Mono',monospace}
.u-name{font-size:12.5px}
.u-role{font-size:10px;color:var(--text-3);font-family:'DM Mono',monospace}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-shrink:0}
.topbar-title{font-size:13.5px;font-weight:500}
.topbar-date{font-size:11px;color:var(--text-2);font-family:'DM Mono',monospace}
.topbar-r{display:flex;align-items:center;gap:8px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:0 12px;height:32px;width:240px;transition:var(--transition)}
.search-box:focus-within{border-color:var(--accent);background:var(--bg)}
.search-box input{background:transparent;border:none;outline:none;color:var(--text-1);font-size:11.5px;width:100%;font-family:'DM Sans',sans-serif}
.icon-btn{width:32px;height:32px;border-radius:var(--r);background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:var(--transition)}
.icon-btn:hover{border-color:var(--border-md);background:var(--bg-hover)}

/* Content */
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--text-3);border-radius:2px}

/* Page Header */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.page-title{font-size:18px;font-weight:500;letter-spacing:-.4px}
.page-actions{display:flex;gap:8px}

/* KPI Mini */
.fleet-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.f-kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px}
.f-kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.f-kpi-val{font-size:16px;font-weight:500}
.f-kpi-lbl{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em}

/* Filters */
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.filter-btn{padding:6px 12px;border-radius:var(--r);font-size:11.5px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:var(--transition)}
.filter-btn:hover, .filter-btn.active{border-color:var(--border-hi);color:var(--text-1);background:var(--bg-hover)}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Table */
.fleet-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;text-transform:uppercase;color:var(--text-3);letter-spacing:.08em;padding:12px 18px;border-bottom:1px solid var(--border);font-weight:500}
td{padding:14px 18px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover);cursor:pointer}

.v-info{display:flex;align-items:center;gap:10px}
.v-img{width:36px;height:36px;border-radius:8px;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:16px}
.v-name{font-weight:500;margin-bottom:2px}
.v-plate{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-2);background:var(--bg-hover);padding:1px 5px;border-radius:3px}

.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;font-weight:500}
.s-operational{background:var(--green-dim);color:var(--green)}
.s-service{background:var(--accent-dim);color:var(--accent)}
.s-flagged{background:var(--amber-dim);color:var(--amber)}
.s-overdue{background:var(--red-dim);color:var(--red)}

.v-meta{font-size:11px;color:var(--text-2)}
.v-meta b{color:var(--text-1);font-weight:500;font-family:'DM Mono',monospace}

.action-dots{color:var(--text-3);cursor:pointer;padding:4px}
.action-dots:hover{color:var(--text-1)}

/* Buttons */
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:1px solid var(--border-md);background:var(--bg-card);color:var(--text-2);transition:all .15s;display:flex;align-items:center;gap:6px}
.btn:hover{color:var(--text-1);border-color:var(--border-hi)}
.btn.prim{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.prim:hover{opacity:.9}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
tr{animation:fadeIn .3s ease both}
</style>
</head>
<body>
<div class="shell">

<!-- ── Sidebar ── -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-name">Repyar</div>
    <div class="logo-tag">Business Portal · v2</div>
  </div>

  <div class="nav-section">
    <span class="nav-lbl">Main</span>
    <a href="repyar-dashboard-v2.html" class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
      Dashboard
    </a>
    <a href="repyar-fleet-v2.html" class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="7" cy="4" rx="4" ry="2.5"/><path d="M3 4v6c0 1.4 1.8 2.5 4 2.5s4-1.1 4-2.5V4"/></svg>
      Vehicles
    </a>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 2.5h12M1 7h8M1 11.5h5"/></svg>
      Jobs
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="11" height="11" rx="2"/><path d="M4.5 7h5M4.5 9.5h3"/></svg>
      Quotations
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="1.5" width="11" height="11" rx="2"/><path d="M7 5v4M5 7h4"/></svg>
      Invoices
    </div>
  </div>

  <div class="nav-section">
    <span class="nav-lbl">Analytics</span>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 11 4.5 7l3 3L11 4.5"/></svg>
      Spend Analytics
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 10l3-4 3 2 2.5-4L12 1.5"/></svg>
      Performance
    </div>
  </div>

  <div class="sidebar-foot">
    <div class="u-avatar">MN</div>
    <div>
      <div class="u-name">mnz</div>
      <div class="u-role">admin</div>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:20px">
      <div>
        <div class="topbar-title">Vehicles</div>
        <div class="topbar-date">Manage your fleet</div>
      </div>
      <div class="search-box">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><circle cx="6" cy="6" r="5"/><path d="M10 10l3 3"/></svg>
        <input type="text" placeholder="Search by plate, model, driver...">
      </div>
    </div>
    <div class="topbar-r">
      <div class="icon-btn" id="theme-toggle" title="Toggle theme">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--text-2)" stroke-width="1.5" class="sun-icon"><circle cx="7" cy="7" r="3"/><path d="M7 1v1M7 12v1M1 7h1M12 7h1M2.8 2.8l.7.7M10.5 10.5l.7.7M2.8 11.2l.7-.7M10.5 3.5l.7-.7"/></svg>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--text-2)" stroke-width="1.5" class="moon-icon" style="display:none"><path d="M11.5 8.5A5 5 0 1 1 5.5 2.5a5.5 5.5 0 1 0 6 6z"/></svg>
      </div>
      <div class="icon-btn"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--text-2)" stroke-width="1.5"><circle cx="7" cy="5" r="2.5"/><path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg></div>
    </div>
  </div>

  <div class="content">
    
    <div class="page-head">
      <div class="page-title">Fleet Overview</div>
      <div class="page-actions">
        <button class="btn"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7h10M7 2v10"/></svg> Export CSV</button>
        <button class="btn prim"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7h10M7 2v10"/></svg> Add Vehicle</button>
      </div>
    </div>

    <div class="fleet-stats">
      <div class="f-kpi">
        <div class="f-kpi-icon" style="background:var(--accent-dim);color:var(--accent)"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="7" cy="4" rx="4" ry="2.5"/><path d="M3 4v6c0 1.4 1.8 2.5 4 2.5s4-1.1 4-2.5V4"/></svg></div>
        <div><div class="f-kpi-val">48</div><div class="f-kpi-lbl">Total Fleet</div></div>
      </div>
      <div class="f-kpi">
        <div class="f-kpi-icon" style="background:var(--green-dim);color:var(--green)"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5.5"/><path d="M4.5 7l2 2 3-3"/></svg></div>
        <div><div class="f-kpi-val">32</div><div class="f-kpi-lbl">Operational</div></div>
      </div>
      <div class="f-kpi">
        <div class="f-kpi-icon" style="background:var(--accent-dim);color:var(--accent)"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 7h12M7 1v12"/></svg></div>
        <div><div class="f-kpi-val">10</div><div class="f-kpi-lbl">In Service</div></div>
      </div>
      <div class="f-kpi">
        <div class="f-kpi-icon" style="background:var(--red-dim);color:var(--red)"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v12M1 7h12"/></svg></div>
        <div><div class="f-kpi-val">2</div><div class="f-kpi-lbl">Overdue</div></div>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active">All Vehicles</button>
      <button class="filter-btn">Operational</button>
      <button class="filter-btn">In Maintenance</button>
      <button class="filter-btn">Flagged</button>
      <div style="margin-left:auto; display:flex; gap:8px">
        <button class="filter-btn"><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 3.5h12M3 7h8M5 10.5h4"/></svg> Filter</button>
      </div>
    </div>

    <div class="fleet-card">
      <table>
        <thead>
          <tr>
            <th>Vehicle Details</th>
            <th>Status</th>
            <th>Last Service</th>
            <th>Next Service</th>
            <th>Health</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="fleet-body">
          <!-- Rows via JS -->
        </tbody>
      </table>
    </div>

  </div>
</div>
</div>

<script>
const vehicles = [
  { id: 'DL1C 3344', model: 'Tata Ace Gold', type: 'Mini Truck', status: 'In Service', last: 'Mar 12, 2026', next: 'Apr 25, 2026', health: 65, color: '#4F8EF7' },
  { id: 'MH12 9988', model: 'Mahindra Blazo X', type: 'HCV Truck', status: 'Operational', last: 'Apr 02, 2026', next: 'May 15, 2026', health: 92, color: '#22D3A0' },
  { id: 'KA01 5566', model: 'Ashok Leyland Dost', type: 'LCV Truck', status: 'Flagged', last: 'Feb 20, 2026', next: 'Apr 10, 2026', health: 45, color: '#F5A623' },
  { id: 'TN09 7712', model: 'Eicher Pro 2049', type: 'ICV Truck', status: 'Overdue', last: 'Jan 15, 2026', next: 'Apr 05, 2026', health: 30, color: '#F05252' },
  { id: 'KA05 AB 1234', model: 'Tata Prima 5530.S', type: 'Heavy Trailer', status: 'Operational', last: 'Apr 08, 2026', next: 'Jun 10, 2026', health: 98, color: '#22D3A0' },
  { id: 'DL01 G 4422', model: 'BharatBenz 1923C', type: 'Tipper', status: 'Operational', last: 'Mar 28, 2026', next: 'May 20, 2026', health: 88, color: '#22D3A0' },
  { id: 'MH04 JK 5500', model: 'Mahindra Furio 14', type: 'ICV Truck', status: 'In Service', last: 'Apr 05, 2026', next: 'Apr 15, 2026', health: 70, color: '#4F8EF7' },
  { id: 'KA03 M 9001', model: 'Tata Winger Cargo', type: 'Van', status: 'Operational', last: 'Apr 09, 2026', next: 'Jun 15, 2026', health: 95, color: '#22D3A0' }
];

function renderFleet() {
  const body = document.getElementById('fleet-body');
  body.innerHTML = vehicles.map((v, i) => `
    <tr style="animation-delay: ${i * 40}ms">
      <td>
        <div class="v-info">
          <div class="v-img">🚚</div>
          <div>
            <div class="v-name">${v.model}</div>
            <span class="v-plate">${v.id}</span>
          </div>
        </div>
      </td>
      <td>
        <span class="status-chip s-${v.status.toLowerCase().replace(' ', '')}">${v.status}</span>
      </td>
      <td class="v-meta">${v.last}</td>
      <td class="v-meta" style="color:${v.status === 'Overdue' ? 'var(--red)' : 'inherit'}">${v.next}</td>
      <td>
        <div style="display:flex; align-items:center; gap:8px; width:120px">
          <div style="flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden">
            <div style="width:${v.health}%; height:100%; background:${v.color}"></div>
          </div>
          <span style="font-size:10px; font-family:'DM Mono', monospace; width:24px">${v.health}%</span>
        </div>
      </td>
      <td><span class="action-dots">•••</span></td>
    </tr>
  `).join('');
}

// ── Theme Logic (Synced) ──
const themeToggle = document.getElementById('theme-toggle');
const sunIcon = themeToggle.querySelector('.sun-icon');
const moonIcon = themeToggle.querySelector('.moon-icon');

function getTheme() {
  const saved = localStorage.getItem('repyar-theme');
  if (saved) return saved;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('repyar-theme', theme);
  if (theme === 'light') {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  } else {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  }
}

themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'light' ? 'dark' : 'light');
});

setTheme(getTheme());
renderFleet();
</script>
</body>
</html>
